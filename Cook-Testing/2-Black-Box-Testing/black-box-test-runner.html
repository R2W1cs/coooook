<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cook's Black-Box Test Runner</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.9rem;
      font-weight: 800;
    }
    p {
      margin: 0;
      color: #94a3b8;
      line-height: 1.5;
    }
    .top {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .btn {
      border: 0;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-weight: 700;
      padding: 10px 16px;
      cursor: pointer;
    }
    .btn:hover { background: #1d4ed8; }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 18px;
    }
    .num {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 6px;
    }
    .label {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.74rem;
      color: #94a3b8;
      font-weight: 700;
    }
    .pass { color: #4ade80; }
    .fail { color: #f87171; }
    .total { color: #60a5fa; }
    .suite { color: #f59e0b; }
    .progress {
      height: 8px;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      transition: width 0.4s ease;
    }
    .suite-block {
      margin-bottom: 18px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #334155;
      background: #111827;
    }
    .suite-title {
      padding: 14px 18px;
      background: #172033;
      font-size: 1rem;
      font-weight: 700;
      color: #f8fafc;
      border-bottom: 1px solid #334155;
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px 18px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
    }
    .row:last-child { border-bottom: 0; }
    .status {
      min-width: 52px;
      text-align: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 800;
      margin-top: 1px;
    }
    .status-pass {
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
    }
    .status-fail {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
    }
    .meta {
      flex: 1;
      min-width: 0;
    }
    .test-id {
      color: #60a5fa;
      font-weight: 700;
      margin-right: 8px;
    }
    .test-name {
      color: #e2e8f0;
      font-weight: 600;
    }
    .detail {
      color: #94a3b8;
      font-size: 0.85rem;
      margin-top: 6px;
      white-space: pre-wrap;
    }
    .footer {
      color: #64748b;
      font-size: 0.8rem;
      margin-top: 24px;
    }
    .frame-wrap {
      margin-top: 28px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #334155;
      background: #020617;
    }
    .frame-head {
      padding: 10px 14px;
      font-size: 0.8rem;
      color: #94a3b8;
      border-bottom: 1px solid #334155;
    }
    #appFrameMount iframe {
      width: 100%;
      height: 760px;
      border: 0;
      background: #fff;
    }
    @media (max-width: 900px) {
      .summary {
        grid-template-columns: repeat(2, minmax(140px, 1fr));
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <div>
        <h1>Cook's Black-Box Test Runner</h1>
        <p>
          This runner loads the real app in an iframe and executes browser tests
          against the actual UI and localStorage behavior.
        </p>
      </div>
      <button class="btn" onclick="window.location.reload()">Re-run Tests</button>
    </div>

    <div class="summary">
      <div class="card">
        <div class="num total" id="statTotal">0</div>
        <div class="label">Total Tests</div>
      </div>
      <div class="card">
        <div class="num pass" id="statPass">0</div>
        <div class="label">Passed</div>
      </div>
      <div class="card">
        <div class="num fail" id="statFail">0</div>
        <div class="label">Failed</div>
      </div>
      <div class="card">
        <div class="num suite" id="statSuites">0</div>
        <div class="label">Suites</div>
      </div>
    </div>

    <div class="progress"><div class="progress-fill" id="progressFill"></div></div>

    <div id="results"></div>

    <div class="frame-wrap">
      <div class="frame-head">Live app under test</div>
      <div id="appFrameMount"></div>
    </div>

    <div class="footer" id="runMeta">Waiting for tests to start...</div>
  </main>

  <script src="black-box-harness.js"></script>
  <script src="test-cases.tests.js"></script>
  <script src="state-transition.tests.js"></script>
  <script src="equivalence-partitioning.tests.js"></script>
  <script src="decision-tables.tests.js"></script>
  <script src="traceability-matrix.tests.js"></script>
</body>
</html>
